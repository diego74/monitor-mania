<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#2E5C9A">
    <title>Monitor de Manía</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
        }

        body {
            overflow: hidden;
            position: fixed;
        }

        #root {
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 20px;
        }

        .container {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 12px;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 6px solid #2E5C9A;
        }

        .header h1 {
            font-size: 22px;
            color: #1F4788;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
        }

        .header-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            padding: 10px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #2E5C9A;
            color: white;
        }

        .btn-secondary {
            background: white;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab-btn {
            padding: 10px 8px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #666;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #2E5C9A;
            color: white;
            box-shadow: 0 4px 12px rgba(46,92,154,0.3);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card h2 {
            font-size: 16px;
            color: #1F4788;
            margin-bottom: 12px;
        }

        .card-info {
            font-size: 12px;
            color: #666;
            margin-bottom: 14px;
            padding: 10px;
            background: #f0f9ff;
            border-radius: 6px;
            border-left: 3px solid #0ea5e9;
        }

        .test-question {
            background: #f9fafb;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #e5e7eb;
            margin-bottom: 14px;
        }

        .test-question-text {
            font-weight: 600;
            color: #1F4788;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .test-options {
            display: grid;
            gap: 6px;
        }

        .test-option {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: white;
            color: #333;
            font-weight: 500;
            cursor: pointer;
            font-size: 12px;
            text-align: left;
            transition: all 0.2s;
        }

        .test-option.selected {
            border: 2px solid #2E5C9A;
            background: #eff6ff;
            color: #2E5C9A;
            font-weight: 600;
        }

        .test-progress {
            background: #f0f9ff;
            border-radius: 8px;
            border-left: 4px solid #0ea5e9;
            padding: 12px;
            font-size: 13px;
            color: #0369a1;
            margin-top: 16px;
            margin-bottom: 16px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 16px;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .submit-btn:hover:not(:disabled) {
            background: #059669;
        }

        .analysis-card {
            background: #f9fafb;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .analysis-label {
            font-size: 11px;
            color: #666;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .analysis-value {
            font-size: 24px;
            font-weight: bold;
            color: #2E5C9A;
        }

        .comparison-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
            padding: 10px;
            background: #f9fafb;
            border-radius: 8px;
            align-items: center;
            font-size: 12px;
        }

        .comparison-row-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
            font-weight: 600;
            color: #1F4788;
            font-size: 11px;
        }

        .comparison-label {
            font-weight: 600;
            color: #333;
        }

        .comparison-value {
            text-align: center;
            font-weight: 600;
        }

        .comparison-value.caregiver {
            color: #2E5C9A;
        }

        .comparison-value.patient {
            color: #d946ef;
        }

        .comparison-value.match {
            color: #10b981;
        }

        .comparison-value.mismatch {
            color: #ef4444;
        }

        .view-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .view-btn {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #666;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }

        .view-btn.active {
            background: #2E5C9A;
            color: white;
            border-color: #2E5C9A;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px 20px;
            font-size: 13px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .hidden {
            display: none !important;
        }

        .chart-container {
            width: 100%;
            height: 250px;
            position: relative;
            margin: 20px 0;
        }

        .day-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            overflow-x: auto;
            padding: 4px 0;
        }

        .day-btn {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #666;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }

        .day-btn.active {
            background: #2E5C9A;
            color: white;
            border-color: #2E5C9A;
        }

        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #10b981;
            margin-bottom: 16px;
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }

            .header {
                padding: 14px;
            }

            .header h1 {
                font-size: 20px;
            }

            .card {
                padding: 14px;
            }

            .comparison-row,
            .comparison-row-header {
                grid-template-columns: 2fr 1fr 1fr;
            }

            .comparison-row-header div:last-child,
            .comparison-row div:last-child {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="container">
            <div class="header">
                <h1>📊 Monitor de Manía</h1>
                <p id="headerDia">Daniela</p>
                <div class="header-buttons">
                    <button class="btn btn-primary" onclick="downloadJSON()">
                        ⬇️ Descargar
                    </button>
                    <button class="btn btn-secondary" id="installBtn" style="display:none" onclick="installApp()">
                        ⬆️ Instalar
                    </button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('caregiver')">👨‍⚕️ Tu Test</button>
                <button class="tab-btn" onclick="switchTab('patient')">👩 Test Daniela</button>
                <button class="tab-btn" onclick="switchTab('analysis')">📈 Análisis</button>
            </div>

            <!-- TEST CUIDADOR -->
            <div id="caregiver" class="tab-content active">
                <div class="card">
                    <h2>Test del Cuidador</h2>
                    <div class="card-info">
                        Observa a Daniela y responde según lo que VES ahora.
                    </div>
                    <div id="caregiverContainer"></div>
                    <div class="test-progress">
                        <span id="caregiverProgress">0/10 respondidas</span>
                    </div>
                    <button class="submit-btn" id="caregiverSubmit" disabled onclick="submitCaregiverTest()">
                        ✓ Guardar Test
                    </button>
                </div>
            </div>

            <!-- TEST DANIELA -->
            <div id="patient" class="tab-content">
                <div class="card">
                    <h2>Test de Intereses y Personalidad</h2>
                    <div class="card-info">
                        Daniela responde estas preguntas. Ella no necesita saber que medimos síntomas.
                    </div>
                    <div id="patientContainer"></div>
                    <div class="test-progress">
                        <span id="patientProgress">0/8 respondidas</span>
                    </div>
                    <button class="submit-btn" id="patientSubmit" disabled onclick="submitPatientTest()">
                        ✓ Guardar Test
                    </button>
                </div>
            </div>

            <!-- ANÁLISIS Y COMPARACIÓN -->
            <div id="analysis" class="tab-content">
                <div class="card">
                    <h2>📊 Análisis y Comparación</h2>
                    
                    <div class="view-toggle">
                        <button class="view-btn active" onclick="switchView('summary')">Resumen</button>
                        <button class="view-btn" onclick="switchView('graph')">Gráfico</button>
                    </div>

                    <div id="summaryView">
                        <div id="summaryContainer"></div>
                    </div>

                    <div id="graphView" style="display: none;">
                        <div class="chart-container" id="chartContainer"></div>
                    </div>

                    <div id="dayView" style="display: none;">
                        <div class="day-selector" id="daySelector"></div>
                        <div id="dayContainer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script>
        let caregiverHistory = [];
        let patientHistory = [];
        let deferredPrompt;
        let currentView = 'summary';
        let chart = null;

        const caregiverQuestions = [
            { id: 'cg1', question: '¿Cambio de actividad cada cuánto tiempo?', options: ['Estable (1+ hora)', 'Normal (30-60 min)', 'Frecuente (15-30 min)', 'Muy frecuente (5-15 min)', 'Constante (cada min)'], measures: 'distractibility' },
            { id: 'cg2', question: '¿Cuántas horas durmió anoche?', options: ['< 3 horas', '3-4 horas', '4-5 horas', '5-6 horas', '6+ horas'], measures: 'sleep' },
            { id: 'cg3', question: 'Nivel de irritabilidad observado', options: ['Muy calmada (0-2)', 'Calmada (3-4)', 'Normal (5-6)', 'Irritable (7-8)', 'Muy irritable (9-10)'], measures: 'irritability' },
            { id: 'cg4', question: 'Nivel de conflicto/confrontación', options: ['Ninguno', 'Mínimo', 'Moderado', 'Bastante', 'Extremo'], measures: 'conflict' },
            { id: 'cg5', question: '¿Qué tan rápido habla?', options: ['Más lento que normal', 'Normal', 'Un poco más rápido', 'Bastante más rápido', 'Muy rápido, atropellada'], measures: 'pressured_speech' },
            { id: 'cg6', question: '¿Impulsos de comprar/hacer cosas?', options: ['No hay impulsos', 'Mínimos impulsos', 'Algunos impulsos', 'Muchos impulsos', 'Impulsos constantes'], measures: 'impulsivity' },
            { id: 'cg7', question: '¿Parece aburrida o acelerada?', options: ['Muy tranquila', 'Tranquila', 'Normal', 'Acelerada', 'Muy acelerada'], measures: 'energy' },
            { id: 'cg8', question: 'Nivel de grandiosidad (sobreestima capacidades)', options: ['Humilde', 'Normal', 'Confiada', 'Exagerada', 'Delirante'], measures: 'grandiosity' },
            { id: 'cg9', question: '¿Fuga de ideas (salta de tema constantemente)?', options: ['No', 'Raramente', 'A veces', 'Frecuentemente', 'Constantemente'], measures: 'flight_of_ideas' },
            { id: 'cg10', question: '¿Capaz de concentrarse en una actividad?', options: ['Muy capaz', 'Capaz', 'Normal', 'Dificultad', 'Muy difícil'], measures: 'concentration' }
        ];

        const patientQuestions = [
            { id: 'pt1', question: '¿Cuántos proyectos o ideas nuevas en la última hora?', options: ['Ninguno', '1-2', '3-5', '6-10', 'Más de 10'], measures: 'flight_of_ideas' },
            { id: 'pt2', question: '¿Con qué frecuencia cambias de opinión?', options: ['Casi nunca', 'A veces', 'Bastante', 'Muy frecuentemente', 'Constantemente'], measures: 'impulsivity' },
            { id: 'pt3', question: '¿Cuán importante es tu opinión?', options: ['Poco importante', 'Algo importante', 'Importante', 'Muy importante', 'La más importante'], measures: 'grandiosity' },
            { id: 'pt4', question: '¿Qué tan rápido hablas?', options: ['Más lento', 'Normal', 'Un poco más rápido', 'Bastante más rápido', 'Muy rápido'], measures: 'pressured_speech' },
            { id: 'pt5', question: '¿Cuántas cosas intentas hacer al mismo tiempo?', options: ['Una', '2', '3', '4-5', '6 o más'], measures: 'distractibility' },
            { id: 'pt6', question: '¿Qué tan seguido quieres comprar sin pensar?', options: ['Raramente', 'Ocasionalmente', 'Regularmente', 'Frecuentemente', 'Constantemente'], measures: 'impulsivity' },
            { id: 'pt7', question: '¿Cuánta energía tienes vs hace 1 semana?', options: ['Mucha menos', 'Menos', 'Similar', 'Más', 'Muchísima más'], measures: 'increased_energy' },
            { id: 'pt8', question: '¿Cuán fácil es concentrarte?', options: ['Muy fácil', 'Fácil', 'Normal', 'Difícil', 'Muy difícil'], measures: 'distractibility' }
        ];

        // Detectar instalación
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'flex';
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    document.getElementById('installBtn').style.display = 'none';
                });
            }
        }

        // Registrar SW
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,' + encodeURIComponent(`
                const CACHE = 'mania-v1';
                self.addEventListener('install', e => e.waitUntil(caches.open(CACHE)));
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
                });
            `)).catch(() => {});
        }

        // Cargar datos
        function loadData() {
            const saved1 = localStorage.getItem('maniaCaregiver');
            const saved2 = localStorage.getItem('maniaPatient');
            if (saved1) caregiverHistory = JSON.parse(saved1);
            if (saved2) patientHistory = JSON.parse(saved2);
            
            renderCaregiverTest();
            renderPatientTest();
            renderAnalysis();
        }

        // CAREGIVER TEST
        let caregiverResponses = {};

        function renderCaregiverTest() {
            const container = document.getElementById('caregiverContainer');
            caregiverResponses = {};
            let html = '';
            caregiverQuestions.forEach((q, idx) => {
                html += `<div class="test-question">
                    <div class="test-question-text">${idx + 1}. ${q.question}</div>
                    <div class="test-options">`;
                q.options.forEach((opt, optIdx) => {
                    html += `<button class="test-option" onclick="answerCaregiver('${q.id}', ${optIdx})">${opt}</button>`;
                });
                html += '</div></div>';
            });
            container.innerHTML = html;
            updateCaregiverProgress();
        }

        function answerCaregiver(questionId, answerIndex) {
            caregiverResponses[questionId] = answerIndex;
            updateCaregiverProgress();
            renderCaregiverTest();
        }

        function updateCaregiverProgress() {
            const answered = Object.keys(caregiverResponses).length;
            document.getElementById('caregiverProgress').textContent = `${answered}/10 respondidas`;
            document.getElementById('caregiverSubmit').disabled = answered < 10;
        }

        function submitCaregiverTest() {
            const test = {
                timestamp: new Date().toISOString(),
                date: new Date().toLocaleDateString('es-ES'),
                responses: caregiverResponses
            };
            caregiverHistory.push(test);
            localStorage.setItem('maniaCaregiver', JSON.stringify(caregiverHistory));
            alert('✓ Test guardado');
            renderCaregiverTest();
            renderAnalysis();
        }

        // PATIENT TEST
        let patientResponses = {};

        function renderPatientTest() {
            const container = document.getElementById('patientContainer');
            patientResponses = {};
            let html = '';
            patientQuestions.forEach((q, idx) => {
                html += `<div class="test-question">
                    <div class="test-question-text">${idx + 1}. ${q.question}</div>
                    <div class="test-options">`;
                q.options.forEach((opt, optIdx) => {
                    html += `<button class="test-option" onclick="answerPatient('${q.id}', ${optIdx})">${opt}</button>`;
                });
                html += '</div></div>';
            });
            container.innerHTML = html;
            updatePatientProgress();
        }

        function answerPatient(questionId, answerIndex) {
            patientResponses[questionId] = answerIndex;
            updatePatientProgress();
            renderPatientTest();
        }

        function updatePatientProgress() {
            const answered = Object.keys(patientResponses).length;
            document.getElementById('patientProgress').textContent = `${answered}/8 respondidas`;
            document.getElementById('patientSubmit').disabled = answered < 8;
        }

        function submitPatientTest() {
            const test = {
                timestamp: new Date().toISOString(),
                date: new Date().toLocaleDateString('es-ES'),
                responses: patientResponses
            };
            patientHistory.push(test);
            localStorage.setItem('maniaPatient', JSON.stringify(patientHistory));
            alert('✓ Test guardado');
            renderPatientTest();
            renderAnalysis();
        }

        // CALCULATE SCORES
        function calculateScores(caregiverTest, patientTest) {
            const getScore = (responses, questions) => {
                const scores = {};
                questions.forEach(q => {
                    if (!scores[q.measures]) scores[q.measures] = [];
                    if (responses[q.id] !== undefined) {
                        scores[q.measures].push(responses[q.id]);
                    }
                });
                
                const avg = {};
                Object.keys(scores).forEach(k => {
                    avg[k] = scores[k].length > 0 ? scores[k].reduce((a, b) => a + b) / scores[k].length : 0;
                });
                return avg;
            };

            const caregiverScore = getScore(caregiverTest.responses, caregiverQuestions);
            const patientScore = getScore(patientTest.responses, patientQuestions);

            const caregiverSeverity = Object.values(caregiverScore).reduce((a, b) => a + b, 0) / Object.keys(caregiverScore).length || 0;
            const patientSeverity = Object.values(patientScore).reduce((a, b) => a + b, 0) / Object.keys(patientScore).length || 0;

            return { caregiverScore, patientScore, caregiverSeverity, patientSeverity };
        }

        function getManiaLevel(score) {
            if (score < 1.5) return { level: 'Bajo', color: '#10b981' };
            if (score < 3) return { level: 'Moderado', color: '#f59e0b' };
            return { level: 'Elevado', color: '#ef4444' };
        }

        function renderAnalysis() {
            const container = document.getElementById('summaryContainer');
            
            if (caregiverHistory.length === 0 && patientHistory.length === 0) {
                container.innerHTML = '<div class="empty-state">Completa ambos tests para ver el análisis.</div>';
                return;
            }

            let html = '';

            // Obtener último test de cada uno
            const lastCaregiverTest = caregiverHistory.length > 0 ? caregiverHistory[caregiverHistory.length - 1] : null;
            const lastPatientTest = patientHistory.length > 0 ? patientHistory[patientHistory.length - 1] : null;

            if (lastCaregiverTest && lastPatientTest) {
                const scores = calculateScores(lastCaregiverTest, lastPatientTest);

                html += `<div id="successMessage"></div>`;

                const caregiverLevel = getManiaLevel(scores.caregiverSeverity);
                const patientLevel = getManiaLevel(scores.patientSeverity);
                const diff = Math.abs(scores.caregiverSeverity - scores.patientSeverity);

                html += `
                    <div class="comparison-row-header">
                        <div>Dimensión</div>
                        <div>👨‍⚕️ Tú</div>
                        <div>👩 Ella</div>
                        <div>Δ Dif</div>
                    </div>
                `;

                const dimensions = ['distractibility', 'irritability', 'impulsivity', 'grandiosity', 'pressured_speech', 'flight_of_ideas', 'energy'];
                const dimLabels = {
                    distractibility: 'Distractibilidad',
                    irritability: 'Irritabilidad',
                    impulsivity: 'Impulsividad',
                    grandiosity: 'Grandiosidad',
                    pressured_speech: 'Lenguaje Presionado',
                    flight_of_ideas: 'Fuga de Ideas',
                    energy: 'Energía/Aceleración'
                };

                dimensions.forEach(dim => {
                    if (scores.caregiverScore[dim] !== undefined && scores.patientScore[dim] !== undefined) {
                        const cg = (scores.caregiverScore[dim] || 0).toFixed(1);
                        const pt = (scores.patientScore[dim] || 0).toFixed(1);
                        const delta = Math.abs(cg - pt).toFixed(1);
                        const match = delta < 0.5 ? '✓' : '⚠️';
                        const matchClass = delta < 0.5 ? 'match' : 'mismatch';
                        
                        html += `
                            <div class="comparison-row">
                                <div class="comparison-label">${dimLabels[dim]}</div>
                                <div class="comparison-value caregiver">${cg}</div>
                                <div class="comparison-value patient">${pt}</div>
                                <div class="comparison-value ${matchClass}">${match} ${delta}</div>
                            </div>
                        `;
                    }
                });

                html += `
                    <div style="margin-top: 16px; padding: 16px; background: #eff6ff; border-radius: 8px; border-left: 4px solid #2E5C9A;">
                        <div class="analysis-label">ÍNDICE GENERAL</div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px;">
                            <div>
                                <div style="font-size: 11px; color: #666; margin-bottom: 4px;">👨‍⚕️ TÚ (Cuidador)</div>
                                <div style="font-size: 22px; font-weight: bold; color: ${caregiverLevel.color}">${scores.caregiverSeverity.toFixed(1)}/4</div>
                            </div>
                            <div>
                                <div style="font-size: 11px; color: #666; margin-bottom: 4px;">👩 DANIELA</div>
                                <div style="font-size: 22px; font-weight: bold; color: ${patientLevel.color}">${scores.patientSeverity.toFixed(1)}/4</div>
                            </div>
                        </div>
                        <div style="font-size: 12px; color: #666; margin-top: 12px;">
                            <strong>Diferencia:</strong> ${diff.toFixed(1)} puntos
                            ${diff > 1.5 ? '⚠️ Ella subestima su manía' : diff > 0.8 ? '⚠️ Falta de conciencia parcial' : '✓ Buena concordancia'}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
            renderGraph();
        }

        function renderGraph() {
            if (caregiverHistory.length === 0 || patientHistory.length === 0) return;

            const ctx = document.getElementById('chartContainer');
            if (!ctx) return;

            // Preparar datos
            const dates = [];
            const caregiverData = [];
            const patientData = [];

            for (let i = 0; i < Math.max(caregiverHistory.length, patientHistory.length); i++) {
                if (caregiverHistory[i]) {
                    const scores = calculateScores(caregiverHistory[i], patientHistory[i] || caregiverHistory[0]);
                    dates.push(caregiverHistory[i].date.substring(0, 5));
                    caregiverData.push(scores.caregiverSeverity);
                    patientData.push(scores.patientSeverity);
                }
            }

            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: '👨‍⚕️ Tú (Cuidador)',
                            data: caregiverData,
                            borderColor: '#2E5C9A',
                            backgroundColor: 'rgba(46, 92, 154, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '👩 Daniela',
                            data: patientData,
                            borderColor: '#d946ef',
                            backgroundColor: 'rgba(217, 70, 239, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { font: { size: 11 } }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 4,
                            ticks: { font: { size: 10 } }
                        },
                        x: {
                            ticks: { font: { size: 10 } }
                        }
                    }
                }
            });
        }

        // TABS
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function switchView(viewName) {
            currentView = viewName;
            document.querySelectorAll('[id*="View"]').forEach(v => v.style.display = 'none');
            document.getElementById(viewName + 'View').style.display = 'block';
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (viewName === 'graph') {
                setTimeout(() => renderGraph(), 100);
            }
        }

        // DOWNLOAD
        function downloadJSON() {
            const data = {
                timestamp: new Date().toISOString(),
                caregiverHistory,
                patientHistory
            };

            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `monitoreo_daniela_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // Init
        loadData();
    </script>
</body>
</html>
